<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shot Log">
  <meta name="theme-color" content="#0f1923">
  <title>Shot Log</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0f1923;
      --surface: #1a2533;
      --surface2: #243040;
      --accent: #2ecc71;
      --accent-dim: #1e8449;
      --text: #f0f4f8;
      --text-dim: #7f8c9a;
      --red: #e74c3c;
      --yellow: #f39c12;
      --green: #27ae60;
      --border: #2c3e50;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── SCREENS ── */
    .screen { display: none; flex-direction: column; min-height: 100dvh; }
    .screen.active { display: flex; }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; color: var(--accent); }
    .header-right { font-size: 13px; color: var(--text-dim); text-align: right; line-height: 1.4; }

    /* ── HOME ── */
    .home-body { flex: 1; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; }

    .hole-bar {
      background: var(--surface);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--border);
    }
    .hole-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .hole-num { font-size: 48px; font-weight: 800; line-height: 1; color: var(--text); }
    .hole-arrows { display: flex; flex-direction: column; gap: 8px; }
    .arrow-btn {
      width: 48px; height: 48px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .arrow-btn:active { background: var(--accent-dim); }

    .streak-bar {
      background: var(--surface);
      border-radius: 16px;
      padding: 16px 20px;
      border: 1px solid var(--border);
    }
    .streak-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .streak-dots { display: flex; gap: 8px; flex-wrap: wrap; }
    .streak-dot {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700;
    }
    .streak-dot.g1 { background: var(--red); }
    .streak-dot.g2 { background: var(--yellow); color: #1a1a1a; }
    .streak-dot.g3 { background: var(--green); }
    .streak-dot.empty { background: var(--surface2); color: var(--text-dim); font-size: 12px; }

    .log-btn {
      background: var(--accent);
      color: #0f1923;
      font-size: 22px;
      font-weight: 800;
      border: none;
      border-radius: 20px;
      padding: 28px 20px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.1s;
      width: 100%;
    }
    .log-btn:active { background: var(--accent-dim); color: var(--text); }
    .log-btn:disabled { opacity: 0.4; }

    .home-footer { display: flex; justify-content: space-between; padding: 0 4px 32px; }
    .footer-link {
      background: none; border: none;
      color: var(--text-dim); font-size: 14px;
      cursor: pointer; padding: 8px 0; text-decoration: underline;
    }
    .footer-link:active { color: var(--text); }

    /* ── LOG FLOW ── */
    .log-body { flex: 1; padding: 24px 20px; display: flex; flex-direction: column; }
    .step-indicator {
      display: flex; gap: 8px; margin-bottom: 28px;
    }
    .step-pip {
      height: 4px; border-radius: 2px; flex: 1;
      background: var(--surface2);
      transition: background 0.2s;
    }
    .step-pip.done { background: var(--accent); }
    .step-pip.active { background: var(--accent); opacity: 0.5; }

    .step-title { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .step-value { font-size: 52px; font-weight: 800; margin-bottom: 32px; line-height: 1; }

    .num-control { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
    .num-btn {
      width: 72px; height: 72px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 18px;
      color: var(--text); font-size: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .num-btn:active { background: var(--accent-dim); }
    .num-display {
      font-size: 64px; font-weight: 800;
      flex: 1; text-align: center; line-height: 1;
    }

    .next-btn {
      background: var(--accent); color: #0f1923;
      font-size: 18px; font-weight: 700;
      border: none; border-radius: 16px;
      padding: 20px; width: 100%;
      cursor: pointer; margin-top: auto;
      transition: background 0.1s;
    }
    .next-btn:active { background: var(--accent-dim); color: var(--text); }
    .next-btn:disabled { opacity: 0.4; }

    .back-btn {
      background: none; border: none;
      color: var(--text-dim); font-size: 14px;
      cursor: pointer; padding: 16px 0 0;
      text-align: center; width: 100%;
    }
    .back-btn:active { color: var(--text); }

    /* ── CLUBS ── */
    .club-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .club-btn {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 16px; font-weight: 600;
      padding: 18px 8px;
      cursor: pointer;
      text-align: center;
      transition: background 0.1s, border-color 0.1s;
      min-height: 64px;
      display: flex; align-items: center; justify-content: center;
    }
    .club-btn:active, .club-btn.selected {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--text);
    }

    /* ── GRADE ── */
    .grade-grid {
      display: flex; flex-direction: column; gap: 16px;
      margin-top: 8px;
    }
    .grade-btn {
      border: none; border-radius: 20px;
      font-size: 24px; font-weight: 800;
      padding: 32px 20px;
      cursor: pointer;
      display: flex; align-items: center; gap: 16px;
      transition: opacity 0.1s;
    }
    .grade-btn:active { opacity: 0.8; }
    .grade-btn:disabled { opacity: 0.4; }
    .grade-btn.g1 { background: var(--red); color: #fff; }
    .grade-btn.g2 { background: var(--yellow); color: #1a1a1a; }
    .grade-btn.g3 { background: var(--green); color: #fff; }
    .grade-num { font-size: 40px; font-weight: 900; min-width: 48px; }
    .grade-desc { font-size: 15px; font-weight: 500; line-height: 1.3; }

    /* ── CONFIRM ── */
    .confirm-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 40px;
    }
    .confirm-icon { font-size: 80px; }
    .confirm-text { font-size: 28px; font-weight: 700; color: var(--accent); }
    .confirm-detail { font-size: 16px; color: var(--text-dim); text-align: center; line-height: 1.6; }

    /* ── LOG VIEW ── */
    .log-view-body { flex: 1; overflow-y: auto; padding: 0 0 32px; }
    .log-empty { padding: 60px 20px; text-align: center; color: var(--text-dim); font-size: 16px; }
    .log-entry {
      display: flex; align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .log-entry-info { flex: 1; }
    .log-entry-main { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
    .log-entry-sub { font-size: 13px; color: var(--text-dim); }
    .grade-badge {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; flex-shrink: 0;
    }
    .grade-badge.g1 { background: var(--red); }
    .grade-badge.g2 { background: var(--yellow); color: #1a1a1a; }
    .grade-badge.g3 { background: var(--green); }

    .delete-last-btn {
      margin: 20px 20px 0;
      background: none;
      border: 1px solid var(--red);
      border-radius: 12px;
      color: var(--red);
      font-size: 14px; padding: 12px 20px;
      cursor: pointer; width: calc(100% - 40px);
    }
    .delete-last-btn:active { background: rgba(231,76,60,0.15); }

    .log-view-footer { padding: 16px 20px 0; }

    /* ── BACK HEADER BTN ── */
    .back-header-btn {
      background: none; border: none;
      color: var(--text-dim); font-size: 15px;
      cursor: pointer; padding: 4px 0;
      display: flex; align-items: center; gap: 6px;
    }
    .back-header-btn:active { color: var(--text); }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════ HOME -->
<div id="screen-home" class="screen active">
  <div class="header">
    <h1>⛳ Shot Log</h1>
    <div class="header-right">
      <div id="home-shot-count">0 shots</div>
    </div>
  </div>
  <div class="home-body">
    <div class="hole-bar">
      <div>
        <div class="hole-label">Current Hole</div>
        <div class="hole-num" id="home-hole">1</div>
      </div>
      <div class="hole-arrows">
        <div class="arrow-btn" id="hole-up">▲</div>
        <div class="arrow-btn" id="hole-down">▼</div>
      </div>
    </div>

    <div class="streak-bar">
      <div class="streak-label">Last 5 Grades</div>
      <div class="streak-dots" id="streak-dots"></div>
    </div>

    <button class="log-btn" id="log-shot-btn">LOG SHOT</button>
  </div>
  <div class="home-footer">
    <button class="footer-link" id="view-log-btn">View Round Log</button>
    <button class="footer-link" id="export-btn">Export CSV</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════ STEP: HOLE -->
<div id="screen-hole" class="screen">
  <div class="header">
    <button class="back-header-btn" id="back-from-hole">← Back</button>
    <div></div>
  </div>
  <div class="log-body">
    <div class="step-indicator">
      <div class="step-pip active" id="pip1"></div>
      <div class="step-pip" id="pip2"></div>
      <div class="step-pip" id="pip3"></div>
      <div class="step-pip" id="pip4"></div>
    </div>
    <div class="step-title">Hole</div>
    <div class="num-control">
      <div class="num-btn" id="hole-minus">−</div>
      <div class="num-display" id="step-hole-num">1</div>
      <div class="num-btn" id="hole-plus">+</div>
    </div>
    <button class="next-btn" id="hole-next">Next →</button>
    <button class="back-btn" id="back-hole-btn">Cancel</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════ STEP: SHOT # -->
<div id="screen-shot" class="screen">
  <div class="header">
    <button class="back-header-btn" id="back-from-shot">← Hole</button>
    <div></div>
  </div>
  <div class="log-body">
    <div class="step-indicator">
      <div class="step-pip done"></div>
      <div class="step-pip active"></div>
      <div class="step-pip"></div>
      <div class="step-pip"></div>
    </div>
    <div class="step-title">Shot Number</div>
    <div class="num-control">
      <div class="num-btn" id="shot-minus">−</div>
      <div class="num-display" id="step-shot-num">1</div>
      <div class="num-btn" id="shot-plus">+</div>
    </div>
    <button class="next-btn" id="shot-next">Next →</button>
    <button class="back-btn" id="back-shot-btn">← Back</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════ STEP: CLUB -->
<div id="screen-club" class="screen">
  <div class="header">
    <button class="back-header-btn" id="back-from-club">← Shot #</button>
    <div></div>
  </div>
  <div class="log-body">
    <div class="step-indicator">
      <div class="step-pip done"></div>
      <div class="step-pip done"></div>
      <div class="step-pip active"></div>
      <div class="step-pip"></div>
    </div>
    <div class="step-title">Club</div>
    <div class="club-grid" id="club-grid"></div>
    <button class="back-btn" id="back-club-btn">← Back</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════ STEP: GRADE -->
<div id="screen-grade" class="screen">
  <div class="header">
    <button class="back-header-btn" id="back-from-grade">← Club</button>
    <div></div>
  </div>
  <div class="log-body">
    <div class="step-indicator">
      <div class="step-pip done"></div>
      <div class="step-pip done"></div>
      <div class="step-pip done"></div>
      <div class="step-pip active"></div>
    </div>
    <div class="step-title">Grade Your Cue</div>
    <div class="grade-grid">
      <button class="grade-btn g1" data-grade="1">
        <span class="grade-num">1</span>
        <span class="grade-desc">Didn't do it — rushed or wrong move</span>
      </button>
      <button class="grade-btn g2" data-grade="2">
        <span class="grade-num">2</span>
        <span class="grade-desc">Partial — had the thought, execution off</span>
      </button>
      <button class="grade-btn g3" data-grade="3">
        <span class="grade-num">3</span>
        <span class="grade-desc">Nailed it — committed and felt right</span>
      </button>
    </div>
    <button class="back-btn" id="back-grade-btn">← Back</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════ CONFIRM -->
<div id="screen-confirm" class="screen">
  <div class="confirm-screen">
    <div class="confirm-icon" id="confirm-icon">✅</div>
    <div class="confirm-text">Logged</div>
    <div class="confirm-detail" id="confirm-detail"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════ LOG VIEW -->
<div id="screen-log" class="screen">
  <div class="header">
    <button class="back-header-btn" id="back-from-log">← Home</button>
    <h1 style="font-size:16px; color:var(--text);">Round Log</h1>
    <div style="width:60px"></div>
  </div>
  <div class="log-view-body">
    <div id="log-list"></div>
  </div>
  <div class="log-view-footer">
    <button class="delete-last-btn" id="delete-last-btn">🗑 Delete Last Entry</button>
  </div>
</div>

<script>
  // ─── STATE ───────────────────────────────────────────────
  const STORAGE_KEY = 'shotlog_v1';
  let shots = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let currentHole = 1;
  let pendingHole = 1;
  let pendingShot = 1;
  let pendingClub = null;

  const CLUBS = [
    'Driver', '5 Wood',
    '4 Iron', '5 Iron', '6 Iron',
    '7 Iron', '8 Iron', '9 Iron',
    'PW', '50°', '54°', '58°', '60°',
    'Putter'
  ];

  // ─── SAVE ────────────────────────────────────────────────
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(shots));
  }

  // ─── SCREENS ─────────────────────────────────────────────
  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  // ─── HOME ────────────────────────────────────────────────
  function updateHome() {
    document.getElementById('home-hole').textContent = currentHole;
    document.getElementById('home-shot-count').textContent =
      shots.length === 1 ? '1 shot' : `${shots.length} shots`;
    renderStreak();
  }

  function renderStreak() {
    const el = document.getElementById('streak-dots');
    const last5 = shots.slice(-5);
    el.innerHTML = '';
    if (last5.length === 0) {
      const d = document.createElement('div');
      d.className = 'streak-dot empty';
      d.textContent = '—';
      el.appendChild(d);
      return;
    }
    last5.forEach(s => {
      const d = document.createElement('div');
      d.className = `streak-dot g${s.grade}`;
      d.textContent = s.grade;
      el.appendChild(d);
    });
  }

  document.getElementById('hole-up').addEventListener('click', () => {
    if (currentHole < 18) { currentHole++; updateHome(); }
  });
  document.getElementById('hole-down').addEventListener('click', () => {
    if (currentHole > 1) { currentHole--; updateHome(); }
  });

  document.getElementById('log-shot-btn').addEventListener('click', () => {
    pendingHole = currentHole;
    // Auto-calc shot number
    const shotsOnHole = shots.filter(s => s.hole === pendingHole).length;
    pendingShot = shotsOnHole + 1;
    pendingClub = null;

    document.getElementById('step-hole-num').textContent = pendingHole;
    document.getElementById('step-shot-num').textContent = pendingShot;
    show('screen-hole');
  });

  document.getElementById('view-log-btn').addEventListener('click', () => {
    renderLog();
    show('screen-log');
  });

  document.getElementById('export-btn').addEventListener('click', exportCSV);

  // ─── STEP: HOLE ──────────────────────────────────────────
  document.getElementById('hole-minus').addEventListener('click', () => {
    if (pendingHole > 1) {
      pendingHole--;
      document.getElementById('step-hole-num').textContent = pendingHole;
    }
  });
  document.getElementById('hole-plus').addEventListener('click', () => {
    if (pendingHole < 18) {
      pendingHole++;
      document.getElementById('step-hole-num').textContent = pendingHole;
    }
  });
  document.getElementById('hole-next').addEventListener('click', () => {
    // Recalc shot number for this hole
    const shotsOnHole = shots.filter(s => s.hole === pendingHole).length;
    pendingShot = shotsOnHole + 1;
    document.getElementById('step-shot-num').textContent = pendingShot;
    show('screen-shot');
  });
  document.getElementById('back-from-hole').addEventListener('click', () => show('screen-home'));
  document.getElementById('back-hole-btn').addEventListener('click', () => show('screen-home'));

  // ─── STEP: SHOT # ────────────────────────────────────────
  document.getElementById('shot-minus').addEventListener('click', () => {
    if (pendingShot > 1) {
      pendingShot--;
      document.getElementById('step-shot-num').textContent = pendingShot;
    }
  });
  document.getElementById('shot-plus').addEventListener('click', () => {
    if (pendingShot < 15) {
      pendingShot++;
      document.getElementById('step-shot-num').textContent = pendingShot;
    }
  });
  document.getElementById('shot-next').addEventListener('click', () => {
    renderClubs();
    show('screen-club');
  });
  document.getElementById('back-from-shot').addEventListener('click', () => show('screen-hole'));
  document.getElementById('back-shot-btn').addEventListener('click', () => show('screen-hole'));

  // ─── STEP: CLUB ──────────────────────────────────────────
  function renderClubs() {
    const grid = document.getElementById('club-grid');
    grid.innerHTML = '';
    CLUBS.forEach(club => {
      const btn = document.createElement('button');
      btn.className = 'club-btn';
      if (club === pendingClub) btn.classList.add('selected');
      btn.textContent = club;
      btn.addEventListener('click', () => {
        pendingClub = club;
        show('screen-grade');
      });
      grid.appendChild(btn);
    });
  }
  document.getElementById('back-from-club').addEventListener('click', () => show('screen-shot'));
  document.getElementById('back-club-btn').addEventListener('click', () => show('screen-shot'));

  // ─── STEP: GRADE ─────────────────────────────────────────
  let gradeLocked = false;
  document.querySelectorAll('.grade-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (gradeLocked) return;
      gradeLocked = true;
      const grade = parseInt(btn.dataset.grade);
      logShot(grade);
    });
  });
  document.getElementById('back-from-grade').addEventListener('click', () => {
    renderClubs();
    show('screen-club');
  });
  document.getElementById('back-grade-btn').addEventListener('click', () => {
    renderClubs();
    show('screen-club');
  });

  // ─── LOG SHOT ────────────────────────────────────────────
  function logShot(grade) {
    const shot = {
      id: Date.now(),
      hole: pendingHole,
      shot: pendingShot,
      club: pendingClub,
      grade,
      timestamp: new Date().toISOString()
    };
    shots.push(shot);
    save();
    currentHole = pendingHole;
    updateHome();

    // Show confirm
    const icons = { 1: '🔴', 2: '🟡', 3: '🟢' };
    document.getElementById('confirm-icon').textContent = icons[grade];
    document.getElementById('confirm-detail').textContent =
      `Hole ${pendingHole} · Shot ${pendingShot} · ${pendingClub}`;
    show('screen-confirm');

    setTimeout(() => {
      gradeLocked = false;
      show('screen-home');
    }, 1200);
  }

  // ─── LOG VIEW ────────────────────────────────────────────
  function renderLog() {
    const el = document.getElementById('log-list');
    if (shots.length === 0) {
      el.innerHTML = '<div class="log-empty">No shots logged yet.</div>';
      return;
    }
    const reversed = [...shots].reverse();
    el.innerHTML = reversed.map(s => `
      <div class="log-entry">
        <div class="log-entry-info">
          <div class="log-entry-main">Hole ${s.hole} · Shot ${s.shot} · ${s.club}</div>
          <div class="log-entry-sub">${formatTime(s.timestamp)}</div>
        </div>
        <div class="grade-badge g${s.grade}">${s.grade}</div>
      </div>
    `).join('');
  }

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  document.getElementById('back-from-log').addEventListener('click', () => show('screen-home'));

  document.getElementById('delete-last-btn').addEventListener('click', () => {
    if (shots.length === 0) return;
    if (confirm('Delete the last logged shot?')) {
      shots.pop();
      save();
      updateHome();
      renderLog();
    }
  });

  // ─── EXPORT ──────────────────────────────────────────────
  function exportCSV() {
    if (shots.length === 0) { alert('No shots logged yet.'); return; }
    const header = 'hole,shot,club,grade,timestamp';
    const rows = shots.map(s =>
      `${s.hole},${s.shot},"${s.club}",${s.grade},${s.timestamp}`
    );
    const csv = [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const date = new Date().toISOString().slice(0,10);
    a.download = `shotlog-${date}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ─── INIT ─────────────────────────────────────────────────
  updateHome();
</script>
</body>
</html>
